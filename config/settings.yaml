paths:
  # Path to the folder containing the 1000 Synthea FHIR JSON files.
  # Can be absolute or relative to the project root.
  raw_data_dir: "C:/Users/calpo/Downloads/dataset"

  # All output paths below are relative to the project root.
  processed_dir: "data/processed"
  ready_dir: "data/ready"
  reports_dir: "outputs/reports"
  figures_dir: "outputs/figures"
  logs_dir: "outputs/logs"
  log_file: "outputs/logs/phase2.log"

logging:
  level: "INFO"   # DEBUG | INFO | WARNING | ERROR

extraction:
  file_extension: ".json"

profiling:
  top_n: 20   # How many top items to show in profile reports and charts

preprocessing:
  top_n_loinc: 30          # Top LOINC codes to keep in observations_ready.csv
  min_loinc_frequency: 100  # Drop LOINC codes with fewer than this many records
  temporal_anchor: "birth"  # Temporal delta anchor: "birth" = days since birth date

synthesis:
  # Model selection — change these strings to swap models without touching code
  patient_model: "ctgan"    # ctgan | tvae | gaussian_copula
  sequence_model: "par"     # par | ctgan

  # Full training hyperparameters
  epochs: 300
  batch_size: 500
  seed: 42
  n_synthetic_patients: 1000

  # Smoke test (Phase 4A) — fast validation before committing to full training
  smoke_test_epochs: 5
  smoke_test_n_rows: 20

  # ── PAR GPU memory safety (TWO-AXIS control) ──────────────────────────────
  # PAR allocates a padded tensor: [max_seq_len, n_sequences, hidden_dim].
  # Both axes must be bounded; either alone can cause CUDA OOM.
  #
  # par_max_patients (Stage 1 — outer axis):
  #   Randomly sample this many patients BEFORE training.
  #   All events for each sampled patient are retained (complete histories).
  #   Set to null to disable and use all patients.
  #   Tuning: T4 (15 GB) → 400 safe; A100 (40 GB) → 700–800.
  par_max_patients: 400
  #
  # max_seq_len (Stage 2 — inner axis):
  #   For each remaining patient, keep only the most-recent N events.
  #   Tuning: T4 → 50 safe; A100 → 80–100.
  max_seq_len: 50

  # Output paths (relative to project root)
  synthetic_dir: "outputs/synthetic"
  model_dir:     "outputs/models"

  # Per-table model selection (factory pattern — change here, not in code)
  # observations uses ctgan (not par: 303K PAR sequences exceed T4 timeout;
  # not gaussian_copula: cannot model value_quantity | loinc_display conditional
  # distributions; not tvae: same DataTransformer RAM issue as ctgan with no
  # utility benefit for mixed categorical/numerical LOINC-coded data).
  # The joblib sequential backend in pipeline.py eliminates DataTransformer OOM.
  table_models:
    patients:     "ctgan"
    encounters:   "par"
    observations: "ctgan"
    conditions:   "par"
    medications:  "par"

  # Backup configuration — controls where per-table ZIPs are distributed.
  # gdrive_dir: if null, auto-detected (/content/drive/MyDrive/SynthFHIR on Colab)
  # set gdrive_dir explicitly with --gdrive-dir CLI arg or PROJECT_ROOT env var
  backup:
    zip_after_each_table: true
    gdrive_dir: null
